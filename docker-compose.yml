version: '3.1'
services:
  python:
    build: .
    depends_on:
      - db
    # environment:
    #   DB_HOST: db
    #   DB_NAME: taxi_data
    #   DB_USER:  postgres
    #   DB_PASSWORD: password
    #   DB_PORT: 5432
    env_file:
      - .env


  db:
    image: postgres:16
    container_name: postgres_db
    # environment:
    #   POSTGRES_DB: taxi_data
    #   POSTGRES_USER: postgres
    #   POSTGRES_PASSWORD: password
    env_file:
      - .env
    ports:
      - "5432:5432"